<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>生活碎片・好好收集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 治愈奶油温柔渐变背景 */
            background: linear-gradient(145deg, #f8f3ee 0%, #f0e8e0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', 'Noto Sans', sans-serif;
            padding: 20px;
            position: relative; /* 新增：为音乐按钮定位做准备 */
        }

        .container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(180, 160, 140, 0.18);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(225, 210, 195, 0.6);
        }

        .card {
            padding: 1.6rem 1.8rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 0.2rem;
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #a98e7a;
            margin-bottom: 0.3rem;
        }

        .today-date {
            font-size: 0.8rem;
            color: #b8a594;
            background: rgba(235, 225, 215, 0.6);
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            font-weight: 450;
        }

        .stats-grid {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 0.2rem 0 0.6rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 252, 248, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 0.6rem 1rem;
            flex: 1;
            min-width: 100px;
            text-align: center;
            border: 1px solid rgba(215, 200, 185, 0.5);
            box-shadow: 0 4px 10px rgba(160, 140, 120, 0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b09c8b;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }

        .stat-number {
            font-size: 1.9rem;
            font-weight: 700;
            color: #947c6a;
            line-height: 1;
        }

        .stat-unit {
            font-size: 0.8rem;
            font-weight: 400;
            color: #a99685;
            margin-left: 4px;
        }

        .main-action {
            margin: 0.6rem 0 0.4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .message-area {
            background: rgba(255, 250, 243, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 1.2rem 1rem;
            width: 100%;
            text-align: center;
            transition: all 0.25s ease;
            border: 1px solid rgba(230, 215, 200, 0.7);
            box-shadow: 0 8px 20px rgba(170, 150, 130, 0.1);
        }

        .encouragement-text {
            font-size: 1.8rem;
            font-weight: 600;
            color: #a08673;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            /* 初始状态 */
            opacity: 0;
            transform: translateY(10px) scale(0.98);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 浮现动画激活类 */
        .encouragement-text.fade-in {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .encouragement-text span {
            font-size: 2rem;
        }

        .sub-message {
            font-size: 0.85rem;
            color: #b8a492;
            margin-top: 10px;
            opacity: 0.9;
            font-weight: 450;
            /* 子文案也添加淡入效果 */
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s;
        }

        .message-area.fade-in .sub-message {
            opacity: 0.9;
            transform: translateY(0);
        }

        .checkin-btn {
            width: 100%;
            background: linear-gradient(105deg, #e8d9cc, #dcc9b6);
            border: none;
            padding: 1.3rem 0;
            border-radius: 40px;
            font-size: 1.65rem;
            font-weight: 700;
            color: #7c6554;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.06s ease;
            box-shadow: 0 12px 22px rgba(160, 140, 120, 0.2);
            font-family: inherit;
            letter-spacing: 2px;
            position: relative;
        }

        .checkin-btn:active {
            transform: scale(0.96);
            box-shadow: 0 6px 12px rgba(160, 140, 120, 0.15);
            background: linear-gradient(105deg, #d9c8b8, #cbb9a6);
        }

        /* 已删除：combo-text 相关样式 */
        /* 已删除：comboFly 动画 */

        .history-section {
            margin-top: 0.8rem;
            background: rgba(248, 242, 236, 0.7);
            border-radius: 2rem;
            padding: 1rem 1.2rem;
            backdrop-filter: blur(4px);
        }

        .history-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-header h3 {
            font-size: 1rem;
            font-weight: 500;
            color: #a98e7a;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reset-btn {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(190, 170, 150, 0.5);
            padding: 0.25rem 0.9rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #a08673;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .reset-btn:hover {
            background: rgba(225, 210, 195, 0.4);
            color: #8c7260;
        }

        .record-list {
            list-style: none;
            max-height: 170px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .record-list li {
            background: rgba(255, 253, 250, 0.9);
            margin-bottom: 8px;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #947c6a;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid #d2bca8;
            backdrop-filter: blur(2px);
        }

        .record-list li::before {
            content: "🌷";
            font-size: 0.9rem;
        }

        .empty-history {
            text-align: center;
            color: #b09c8b;
            padding: 0.8rem;
            font-style: italic;
            font-size: 0.8rem;
        }

        .record-list::-webkit-scrollbar {
            width: 4px;
        }
        .record-list::-webkit-scrollbar-track {
            background: #f3ebe3;
            border-radius: 10px;
        }
        .record-list::-webkit-scrollbar-thumb {
            background: #c2a994;
            border-radius: 10px;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 0.8rem;
            color: #a99685;
        }

        @media (max-width: 520px) {
            .card {
                padding: 1.2rem 1.2rem 1.6rem;
                gap: 0.8rem;
            }
            .hero h1 {
                font-size: 1.7rem;
            }
            .stat-number {
                font-size: 1.6rem;
            }
            .encouragement-text {
                font-size: 1.45rem;
                gap: 6px;
            }
            .encouragement-text span {
                font-size: 1.7rem;
            }
            .checkin-btn {
                font-size: 1.35rem;
                padding: 1rem 0;
                gap: 10px;
            }
            .message-area {
                padding: 1rem 0.8rem;
            }
            .stats-grid {
                gap: 0.8rem;
            }
            .stat-card {
                padding: 0.5rem 0.7rem;
                min-width: 85px;
            }
        }

        @media (max-width: 400px) {
            .encouragement-text {
                font-size: 1.3rem;
            }
            .checkin-btn {
                font-size: 1.2rem;
                padding: 0.9rem 0;
            }
        }

        .main-action {
            animation: soft-appear 0.3s ease;
        }
        @keyframes soft-appear {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 新增：音乐控制按钮样式 - 不显眼设计 */
        .music-control {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(215, 200, 185, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 12px;
            color: #a98e7a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
            box-shadow: 0 2px 4px rgba(160, 140, 120, 0.1);
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        .music-btn.active {
            color: #8c7260;
            background: rgba(235, 225, 215, 0.6);
        }

        /* 移动端适配音乐按钮 */
        @media (max-width: 520px) {
            .music-control {
                top: 12px;
                right: 12px;
            }
            .music-btn {
                width: 28px;
                height: 28px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
<!-- 新增：音乐播放控件 -->
<div class="music-control">
  <audio id="backgroundMusic" src="https://cdn.jsdelivr.net/gh/realchus/alive@main/softmusic.mp3" preload="auto" loop></audio>
  <button id="musicBtn" class="music-btn">🎵</button>
</div>

<div class="container">
    <div class="card">
        <div class="hero">
            <h1>🌷 生活碎片・好好收集</h1>
            <div class="today-date" id="todayDateDisplay"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📅 坚持天数</div>
                <div class="stat-number"><span id="streakCount">0</span><span class="stat-unit">天</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">✍️ 累计天数</div>
                <div class="stat-number"><span id="totalCount">0</span><span class="stat-unit">次</span></div>
            </div>
        </div>

        <div class="main-action">
            <div class="message-area" id="messageArea">
                <div class="encouragement-text" id="encouragementText">
                    <span>🤍</span> 今天也温柔善待自己
                </div>
                <div class="sub-message">轻轻记录，每一个努力生活的瞬间</div>
            </div>

            <button class="checkin-btn" id="checkinBtn">
                ✨ 我今天也好好生活啦 ✨
            </button>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h3>📋 打卡记录・过往时光合集</h3>
                <button class="reset-btn" id="resetBtn">清空记录</button>
            </div>
            <ul class="record-list" id="historyList">
                <li class="empty-history">🌱 暂无打卡记录，从今天开始打卡吧</li>
            </ul>
        </div>
        <footer>慢慢来，你已经足够温柔和美好</footer>
    </div>
</div>

<script>
    const STORAGE_KEY = "heal_life_tracker_v1";
    let streakDays = 0;
    let totalDays = 0;
    let lastCheckinDate = "";
    let historyDates = [];

    // 新增：震感反馈函数
    function vibrateFeedback(pattern = [100]) {
        // 检测设备是否支持振动API（仅移动设备/部分浏览器支持）
        if (navigator.vibrate || navigator.webkitVibrate) {
            // 兼容webkit内核
            const vibrate = navigator.vibrate || navigator.webkitVibrate;
            vibrate.call(navigator, pattern);
        }
    }

    // 励志文案数组
    const encouragementTexts = [
        "你已经很棒了",
        "今天也辛苦你了",
        "撑过就是胜利",
        "温柔对待自己",
        "一个小小的胜利",
        "你值得被夸奖",
        "呼吸，你做到了",
        "这一分勇气，我看见了",
        "不需要完美，存在就好",
        "又一天，又一份力量",
        "为自己骄傲一下",
        "坚持本身就很美",
        "谢谢你没有放弃",
        "今天的你也闪闪发光",
        "哪怕只是活着，也了不起",
        "你比想象中更坚强",
        "好好休息，明天继续",
        "这一步，已经很厉害",
        "世界因你多了一份温柔",
        "你是自己的光"
    ];

    // 子文案数组（可选搭配）
    const subTexts = [
        "愿你被温柔以待 🤍",
        "每一步都算数 🌷",
        "你值得所有美好 ✨",
        "慢慢来，会好的 ☀️",
        "你的努力，我都看见 💛"
    ];

    const streakSpan = document.getElementById("streakCount");
    const totalSpan = document.getElementById("totalCount");
    const historyListEl = document.getElementById("historyList");
    const checkinBtn = document.getElementById("checkinBtn");
    const resetBtn = document.getElementById("resetBtn");
    const encouragementTextEl = document.getElementById("encouragementText");
    const todayDateDisplay = document.getElementById("todayDateDisplay");
    const messageAreaDiv = document.getElementById("messageArea");

    // 新增：音乐相关元素
    const backgroundMusic = document.getElementById("backgroundMusic");
    const musicBtn = document.getElementById("musicBtn");

    // 新增：音乐播放/暂停切换函数
    function toggleMusic() {
        if (backgroundMusic.paused) {
            // 处理浏览器自动播放限制（必须用户交互后才能播放）
            backgroundMusic.play().catch(err => {
                console.log("音乐播放需要先点击按钮：", err);
            });
            musicBtn.classList.add("active");
            musicBtn.textContent = "🎶"; // 播放状态图标
        } else {
            backgroundMusic.pause();
            musicBtn.classList.remove("active");
            musicBtn.textContent = "🎵"; // 暂停状态图标
        }
    }

    function getTodayDate() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth()+1).padStart(2,"0");
        const d = String(now.getDate()).padStart(2,"0");
        return `${y}-${m}-${d}`;
    }

    function formatDateForDisplay(s) {
        if(!s) return "";
        const [y,m,d] = s.split("-");
        return `${y}年${parseInt(m)}月${parseInt(d)}日`;
    }

    function getYesterdayDate(s) {
        const dt = new Date(s);
        dt.setDate(dt.getDate()-1);
        const y = dt.getFullYear();
        const m = String(dt.getMonth()+1).padStart(2,"0");
        const d = String(dt.getDate()).padStart(2,"0");
        return `${y}-${m}-${d}`;
    }

    function loadData() {
        const s = localStorage.getItem(STORAGE_KEY);
        if(s){
            try{
                const d = JSON.parse(s);
                streakDays = d.streakDays||0;
                totalDays = d.totalDays||0;
                lastCheckinDate = d.lastCheckinDate||"";
                historyDates = d.historyDates||[];
                historyDates.sort();
            }catch(e){ initDefaultData() }
        }else{ initDefaultData() }
    }

    function initDefaultData() {
        streakDays = 0;
        totalDays = 0;
        lastCheckinDate = "";
        historyDates = [];
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            streakDays, totalDays, lastCheckinDate, historyDates
        }));
    }

    function renderUI() {
        streakSpan.textContent = streakDays;
        totalSpan.textContent = totalDays;
        const today = getTodayDate();
        todayDateDisplay.textContent = `📅 ${formatDateForDisplay(today)}`;

        if(historyDates.length===0){
            historyListEl.innerHTML = '<li class="empty-history">🌱 暂无打卡记录，从今天开始打卡吧</li>';
        }else{
            const list = [...historyDates].reverse().slice(0,5);
            const frag = document.createDocumentFragment();
            list.forEach(date=>{
                const li = document.createElement("li");
                li.textContent = formatDateForDisplay(date);
                frag.appendChild(li);
            });
            historyListEl.innerHTML = "";
            historyListEl.appendChild(frag);
        }

        const checked = lastCheckinDate === today;
        if(checked){
            checkinBtn.style.opacity = "0.92";
            checkinBtn.style.background = "linear-gradient(105deg, #d9c8b8, #cbb9a6)";
        }else{
            checkinBtn.style.opacity = "1";
            checkinBtn.style.background = "linear-gradient(105deg, #e8d9cc, #dcc9b6)";
        }

        // 初始渲染时激活浮现效果
        setTimeout(() => {
            encouragementTextEl.classList.add('fade-in');
            messageAreaDiv.classList.add('fade-in');
        }, 100);
    }

    // 随机获取文案
    function getRandomText(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function showMsg() {
        // 随机选取主文案和子文案
        const mainText = getRandomText(encouragementTexts);
        const subText = getRandomText(subTexts);
        
        // 先移除动画类，触发重绘
        encouragementTextEl.classList.remove('fade-in');
        messageAreaDiv.classList.remove('fade-in');
        // 强制重绘
        void encouragementTextEl.offsetWidth;
        
        // 设置新文案
        encouragementTextEl.innerHTML = `<span>🤍</span> ${mainText} <span>🌷</span>`;
        const sm = document.querySelector(".sub-message");
        if(sm) sm.textContent = subText;
        
        // 重新添加动画类，触发浮现效果
        setTimeout(() => {
            encouragementTextEl.classList.add('fade-in');
            messageAreaDiv.classList.add('fade-in');
        }, 50);
    }

    function performCheckIn() {
        // 新增：打卡按钮点击时触发短震动
        vibrateFeedback([20]);
        
        const today = getTodayDate();
        if(lastCheckinDate === today){
            // 已打卡时也随机显示文案
            showMsg();
            return;
        }

        const yesterday = getYesterdayDate(today);
        if(lastCheckinDate === yesterday) streakDays++;
        else streakDays = 1;

        totalDays++;
        lastCheckinDate = today;
        if(!historyDates.includes(today)) historyDates.push(today);
        historyDates.sort();
        saveData();
        renderUI();
        // 打卡成功时显示随机文案
        showMsg();
    }

    function resetAllData() {
        if(!confirm("⚠️ 确定清空所有记录吗？")) return;
        
        initDefaultData();
        saveData();
        renderUI();
        // 重置后恢复默认文案
        encouragementTextEl.innerHTML = '<span>🤍</span> 今天也温柔善待自己 <span>🌷</span>';
        const sm = document.querySelector(".sub-message");
        if(sm) sm.textContent = "轻轻记录，每一个努力生活的瞬间";
    }

    function init() {
        loadData();
        renderUI();
        const today = getTodayDate();
        if(lastCheckinDate === today){
            showMsg(); // 页面初始化时如果已打卡，显示随机文案
        }
        checkinBtn.addEventListener("click", performCheckIn);
        resetBtn.addEventListener("click", resetAllData);
        // 新增：绑定音乐按钮点击事件
        musicBtn.addEventListener("click", toggleMusic);
    }

    init();
</script>
</body>
</html>
